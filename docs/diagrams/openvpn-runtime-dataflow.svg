<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="940" viewBox="0 0 1640 940" role="img" aria-labelledby="title desc">
  <title id="title">OpenVPN Runtime Data Flow</title>
  <desc id="desc">Runtime data flow from VPN clients through OpenVPN status and hint writes into the portal and history store.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text {
      font-family: Arial, Helvetica, sans-serif;
      fill: #0f172a;
    }
    .title {
      font-size: 34px;
      font-weight: 700;
    }
    .subtitle {
      font-size: 16px;
      fill: #475569;
    }
    .section-title {
      font-size: 24px;
      font-weight: 700;
    }
    .node-title {
      font-size: 18px;
      font-weight: 700;
    }
    .node-meta {
      font-size: 13px;
      fill: #334155;
    }
    .arrow-label {
      font-size: 12px;
      fill: #1d4ed8;
      font-weight: 600;
    }
    .arrow-label-green {
      font-size: 12px;
      fill: #047857;
      font-weight: 600;
    }
    .arrow-label-orange {
      font-size: 12px;
      fill: #b45309;
      font-weight: 600;
    }
    .legend-label {
      font-size: 12px;
      fill: #475569;
    }
  </style>

  <rect width="1640" height="940" fill="#f1f5f9"/>

  <text class="title" x="40" y="54">OpenVPN Runtime Data Flow</text>
  <text class="subtitle" x="40" y="84">Client transport, telemetry writes, firewall isolation, and portal reads in the runtime path</text>

  <rect x="30" y="120" width="490" height="650" rx="14" ry="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <rect x="560" y="120" width="510" height="650" rx="14" ry="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <rect x="1100" y="120" width="510" height="650" rx="14" ry="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <text class="section-title" x="50" y="156">A) Client and Tunnel Inputs</text>
  <text class="section-title" x="580" y="156">B) OpenVPN Telemetry and Isolation</text>
  <text class="section-title" x="1120" y="156">C) Portal and Persistence</text>

  <g filter="url(#soft-shadow)">
    <rect x="70" y="190" width="330" height="108" rx="10" ry="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text class="node-title" x="86" y="218">VPN Client</text>
    <text class="node-meta" x="86" y="242">macOS / Windows / iPhone</text>
    <text class="node-meta" x="86" y="266">starts a TCP or UDP tunnel</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="70" y="340" width="330" height="108" rx="10" ry="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <text class="node-title" x="86" y="368">TCP Tunnel</text>
    <text class="node-meta" x="86" y="392">10.9.0.0/24</text>
    <text class="node-meta" x="86" y="416">default client path</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="70" y="490" width="330" height="108" rx="10" ry="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <text class="node-title" x="86" y="518">UDP Tunnel</text>
    <text class="node-meta" x="86" y="542">10.8.0.0/24</text>
    <text class="node-meta" x="86" y="566">optional performance path</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="610" y="210" width="330" height="126" rx="10" ry="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
    <text class="node-title" x="626" y="238">OpenVPN Server</text>
    <text class="node-meta" x="626" y="262">openvpn@server-tcp / server-udp</text>
    <text class="node-meta" x="626" y="286">accepts TCP 443 and UDP 443</text>
    <text class="node-meta" x="626" y="310">emits status and device hooks</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="610" y="384" width="330" height="108" rx="10" ry="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
    <text class="node-title" x="626" y="412">Status Logs</text>
    <text class="node-meta" x="626" y="436">/var/log/openvpn/status-tcp.log</text>
    <text class="node-meta" x="626" y="460">/var/log/openvpn/status-udp.log</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="610" y="534" width="330" height="108" rx="10" ry="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
    <text class="node-title" x="626" y="562">Device Hints</text>
    <text class="node-meta" x="626" y="586">/var/log/openvpn/device_hints.json</text>
    <text class="node-meta" x="626" y="610">client-connect metadata writes</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="820" y="312" width="220" height="150" rx="10" ry="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text class="node-title" x="836" y="340">iptables Rules</text>
    <text class="node-meta" x="836" y="364">cross-tunnel isolation</text>
    <text class="node-meta" x="836" y="388">keeps TCP and UDP</text>
    <text class="node-meta" x="836" y="412">client traffic separated</text>
    <text class="node-meta" x="836" y="436">before portal access</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="1140" y="230" width="330" height="124" rx="10" ry="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
    <text class="node-title" x="1156" y="258">Portal API / UI</text>
    <text class="node-meta" x="1156" y="282">vpn-portal-tcp: 10.9.0.1:8088</text>
    <text class="node-meta" x="1156" y="306">vpn-portal-udp: 10.8.0.1:8088</text>
    <text class="node-meta" x="1156" y="330">reads live telemetry data</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="1140" y="420" width="330" height="118" rx="10" ry="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <text class="node-title" x="1156" y="448">History DB</text>
    <text class="node-meta" x="1156" y="472">data/history.sqlite3</text>
    <text class="node-meta" x="1156" y="496">stores observed session history</text>
  </g>

  <line x1="235" y1="298" x2="235" y2="340" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="175" y="315" width="120" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="235" y="328" text-anchor="middle">connects</text>

  <line x1="235" y1="448" x2="610" y2="272" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="352" y="343" width="98" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="401" y="356" text-anchor="middle">TCP 443</text>

  <line x1="235" y1="598" x2="610" y2="272" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="348" y="466" width="98" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="397" y="479" text-anchor="middle">UDP 443</text>

  <line x1="940" y1="272" x2="1140" y2="292" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="996" y="266" width="80" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="1036" y="279" text-anchor="middle">reads</text>

  <line x1="940" y1="272" x2="1140" y2="480" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="995" y="358" width="82" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="1036" y="371" text-anchor="middle">reads</text>

  <line x1="940" y1="272" x2="820" y2="382" stroke="#d97706" stroke-width="3" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow-orange)"/>
  <rect x="864" y="296" width="82" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label-orange" x="905" y="309" text-anchor="middle">isolates</text>

  <line x1="400" y1="394" x2="820" y2="382" stroke="#d97706" stroke-width="3" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow-orange)"/>
  <rect x="572" y="360" width="82" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label-orange" x="613" y="373" text-anchor="middle">blocked</text>

  <line x1="400" y1="544" x2="820" y2="382" stroke="#d97706" stroke-width="3" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow-orange)"/>
  <rect x="574" y="470" width="82" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label-orange" x="615" y="483" text-anchor="middle">blocked</text>

  <line x1="1040" y1="382" x2="1140" y2="292" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="1066" y="330" width="86" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="1109" y="343" text-anchor="middle">feeds</text>

  <line x1="1040" y1="382" x2="1140" y2="480" stroke="#059669" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="1068" y="424" width="84" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label-green" x="1110" y="437" text-anchor="middle">persists</text>

  <line x1="400" y1="244" x2="610" y2="244" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="485" y="226" width="74" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="522" y="239" text-anchor="middle">to server</text>

  <line x1="400" y1="544" x2="610" y2="244" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="462" y="366" width="74" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="499" y="379" text-anchor="middle">to server</text>

  <line x1="940" y1="382" x2="1140" y2="292" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="985" y="312" width="96" height="18" rx="6" ry="6" fill="#f8fafc" opacity="0.95"/>
  <text class="arrow-label" x="1033" y="325" text-anchor="middle">portal read</text>

  <text x="40" y="842" font-size="13" fill="#475569">Rendered from docs/diagrams/openvpn-runtime-dataflow.mmd. Uses the same flat, light theme as the existing OpenVPN deployment diagrams.</text>

  <line x1="40" y1="874" x2="120" y2="874" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text class="legend-label" x="132" y="878">request / relay</text>

  <line x1="300" y1="874" x2="380" y2="874" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text class="legend-label" x="392" y="878">persistence</text>

  <line x1="540" y1="874" x2="620" y2="874" stroke="#d97706" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow-orange)"/>
  <text class="legend-label" x="632" y="878">isolation / blocked path</text>
</svg>