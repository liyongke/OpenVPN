<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="title desc">
  <title id="title">OpenVPN Portal Live Data Flow - Glassmorphism Style 5</title>
  <desc id="desc">Live pipeline from OpenVPN status writes to portal API and browser updates.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="glow-blue" cx="20%" cy="22%" r="45%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="80%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="56%" cy="84%" r="42%">
      <stop offset="0%" stop-color="#f78166" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#f78166" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>

    <marker id="arrow-blue" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#bc8cff"/>
    </marker>
    <marker id="arrow-orange" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#f78166"/>
    </marker>

    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <style>
    text {
      font-family: Inter, -apple-system, "SF Pro Display", "Segoe UI", Arial, sans-serif;
      fill: #f0f6fc;
    }
    .phase { font-size: 13px; fill: #8b949e; letter-spacing: 0.05em; }
    .node-title { font-size: 16px; font-weight: 700; fill: #f0f6fc; }
    .node-meta { font-size: 12px; fill: #c9d1d9; }
    .link-label { font-size: 12px; font-weight: 600; }
  </style>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" fill="url(#glow-blue)"/>
  <rect width="1200" height="760" fill="url(#glow-purple)"/>
  <rect width="1200" height="760" fill="url(#glow-orange)"/>

  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="url(#title-grad)">OpenVPN Portal Live Data Flow</text>
  <text x="600" y="76" text-anchor="middle" font-size="14" fill="#8b949e">Status polling, enrichment, SSE streaming, and history persistence</text>

  <text class="phase" x="92" y="132">SOURCE</text>
  <text class="phase" x="392" y="132">COLLECTION</text>
  <text class="phase" x="690" y="132">SERVING</text>
  <text class="phase" x="948" y="132">CONSUMERS</text>

  <!-- Column containers -->
  <rect x="70" y="144" width="250" height="528" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.16"/>
  <rect x="370" y="144" width="250" height="528" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.16"/>
  <rect x="670" y="144" width="230" height="528" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.16"/>
  <rect x="930" y="144" width="200" height="528" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.16"/>

  <g filter="url(#soft-shadow)">
    <rect x="90" y="180" width="210" height="106" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.20"/>
    <line x1="100" y1="194" x2="290" y2="194" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="106" y="218">OpenVPN TCP</text>
    <text class="node-meta" x="106" y="240">status-tcp.log update</text>
    <text class="node-meta" x="106" y="260">interval typically 2s</text>
    <text class="node-meta" x="106" y="278">session counters</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="90" y="304" width="210" height="106" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.20"/>
    <line x1="100" y1="318" x2="290" y2="318" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="106" y="342">OpenVPN UDP</text>
    <text class="node-meta" x="106" y="364">status-udp.log update</text>
    <text class="node-meta" x="106" y="384">interval typically 2s</text>
    <text class="node-meta" x="106" y="402">session counters</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="90" y="428" width="210" height="106" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.20"/>
    <line x1="100" y1="442" x2="290" y2="442" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="106" y="466">Device Hints</text>
    <text class="node-meta" x="106" y="488">device_hints.json writes</text>
    <text class="node-meta" x="106" y="508">client-connect metadata</text>
    <text class="node-meta" x="106" y="526">endpoint keyed hints</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="390" y="220" width="210" height="126" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
    <line x1="400" y1="236" x2="590" y2="236" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="406" y="262">LiveStateCollector</text>
    <text class="node-meta" x="406" y="286">poll_interval_seconds</text>
    <text class="node-meta" x="406" y="306">subscribe() queue fan-out</text>
    <text class="node-meta" x="406" y="326">latest_payload cache</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="390" y="374" width="210" height="126" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
    <line x1="400" y1="390" x2="590" y2="390" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="406" y="416">openvpn_reader</text>
    <text class="node-meta" x="406" y="440">merge TCP and UDP rows</text>
    <text class="node-meta" x="406" y="460">protocol tagging</text>
    <text class="node-meta" x="406" y="480">device inference fallback</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="690" y="220" width="190" height="126" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
    <line x1="700" y1="236" x2="870" y2="236" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="706" y="262">API Routes</text>
    <text class="node-meta" x="706" y="286">/api/sessions</text>
    <text class="node-meta" x="706" y="306">/api/summary</text>
    <text class="node-meta" x="706" y="326">/api/history/7d</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="690" y="374" width="190" height="126" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
    <line x1="700" y1="390" x2="870" y2="390" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="706" y="416">SSE Stream</text>
    <text class="node-meta" x="706" y="440">/api/live/sessions</text>
    <text class="node-meta" x="706" y="460">event queue push</text>
    <text class="node-meta" x="706" y="480">live dashboard refresh</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="950" y="220" width="160" height="126" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.20"/>
    <line x1="960" y1="236" x2="1100" y2="236" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="966" y="262">Browser UI</text>
    <text class="node-meta" x="966" y="286">summary cards</text>
    <text class="node-meta" x="966" y="306">session grid</text>
    <text class="node-meta" x="966" y="326">source panel</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="950" y="374" width="160" height="126" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.20"/>
    <line x1="960" y1="390" x2="1100" y2="390" stroke="#ffffff" stroke-opacity="0.24"/>
    <text class="node-title" x="966" y="416">History DB</text>
    <text class="node-meta" x="966" y="440">SQLite store</text>
    <text class="node-meta" x="966" y="460">retention pruning</text>
    <text class="node-meta" x="966" y="480">7d snapshots</text>
  </g>

  <!-- Links -->
  <path d="M300 236 L389 252" fill="none" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.86" marker-end="url(#arrow-blue)"/>
  <path d="M300 360 L389 282" fill="none" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.86" marker-end="url(#arrow-blue)"/>
  <path d="M300 482 L389 434" fill="none" stroke="#bc8cff" stroke-width="2" stroke-opacity="0.86" marker-end="url(#arrow-purple)"/>

  <path d="M600 284 L689 284" fill="none" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.86" marker-end="url(#arrow-blue)"/>
  <path d="M600 436 L689 436" fill="none" stroke="#bc8cff" stroke-width="2" stroke-opacity="0.86" marker-end="url(#arrow-purple)"/>

  <path d="M880 284 L949 284" fill="none" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.86" marker-end="url(#arrow-blue)"/>
  <path d="M880 436 L949 436" fill="none" stroke="#f78166" stroke-width="2" stroke-opacity="0.86" marker-end="url(#arrow-orange)"/>

  <text class="link-label" x="342" y="226" fill="#8fbfff">poll status</text>
  <text class="link-label" x="346" y="350" fill="#8fbfff">merge source</text>
  <text class="link-label" x="352" y="472" fill="#d0a8ff">enrich device</text>
  <text class="link-label" x="644" y="270" fill="#8fbfff">json response</text>
  <text class="link-label" x="640" y="424" fill="#d0a8ff">event stream</text>
  <text class="link-label" x="912" y="270" fill="#8fbfff">render UI</text>
  <text class="link-label" x="912" y="424" fill="#ffb59f">persist history</text>

  <rect x="70" y="688" width="1060" height="44" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="600" y="716" text-anchor="middle" font-size="13" fill="#8b949e">Read-only loop: collect -> normalize -> serve -> stream -> persist snapshots (no OpenVPN state mutation).</text>
</svg>
