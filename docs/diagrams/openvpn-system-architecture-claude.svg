<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 840" width="1280" height="840" role="img" aria-labelledby="title desc">
  <title id="title">OpenVPN Deployment System Architecture</title>
  <desc id="desc">Claude Official style system architecture diagram for the OpenVPN deployment repository.</desc>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;
      fill: #1a1a1a;
    }
    .layer-label {
      fill: #6a6a6a;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .node-title {
      font-size: 16px;
      font-weight: 700;
    }
    .node-detail {
      font-size: 13px;
      font-weight: 400;
      fill: #5a5a5a;
    }
    .arrow-label {
      font-size: 12px;
      font-weight: 600;
      fill: #5a5a5a;
    }
    .legend-title {
      font-size: 13px;
      font-weight: 700;
      fill: #1a1a1a;
    }
    .legend-text {
      font-size: 12px;
      font-weight: 400;
      fill: #6a6a6a;
    }
  </style>
  <defs>
    <marker id="arrow-claude" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#5a5a5a" />
    </marker>
    <marker id="arrow-claude-dashed" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#5a5a5a" />
    </marker>
    <filter id="shadow-soft" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect width="1280" height="840" fill="#f8f6f3" />

  <text x="640" y="42" text-anchor="middle" font-size="26" font-weight="700">OpenVPN Deployment System Architecture</text>
  <text x="640" y="68" text-anchor="middle" font-size="14" font-weight="400" fill="#6a6a6a">Claude Official style · current runtime, telemetry, and delivery plane</text>

  <text class="layer-label" x="68" y="106">CLIENT LAYER</text>
  <text class="layer-label" x="68" y="252">VPN CORE</text>
  <text class="layer-label" x="68" y="438">PORTAL + STATE</text>
  <text class="layer-label" x="68" y="684">CONTROL PLANE</text>

  <rect x="40" y="92" width="1200" height="150" rx="16" ry="16" fill="none" stroke="#d7d1c7" stroke-width="2" stroke-dasharray="8 6" />
  <rect x="40" y="268" width="1200" height="168" rx="16" ry="16" fill="none" stroke="#d7d1c7" stroke-width="2" stroke-dasharray="8 6" />
  <rect x="40" y="452" width="1200" height="224" rx="16" ry="16" fill="none" stroke="#d7d1c7" stroke-width="2" stroke-dasharray="8 6" />
  <rect x="40" y="690" width="1200" height="124" rx="16" ry="16" fill="none" stroke="#d7d1c7" stroke-width="2" stroke-dasharray="8 6" />

  <!-- Runtime arrows -->
  <path d="M 350 160 L 420 160" fill="none" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow-claude)" />
  <rect x="372" y="144" width="78" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="411" y="158" text-anchor="middle">load .ovpn</text>

  <path d="M 545 205 L 545 240 L 640 240 L 640 275" fill="none" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow-claude)" />
  <rect x="555" y="222" width="96" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="603" y="236" text-anchor="middle">connect 443</text>

  <path d="M 640 385 L 640 430 L 240 430 L 240 470" fill="none" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow-claude)" />
  <rect x="417" y="414" width="92" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="463" y="428" text-anchor="middle">status file</text>

  <path d="M 640 385 L 640 430 L 600 430 L 600 470" fill="none" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow-claude)" />
  <rect x="612" y="414" width="98" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="661" y="428" text-anchor="middle">device hints</text>

  <path d="M 400 512 L 840 512" fill="none" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow-claude)" />
  <rect x="582" y="496" width="74" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="619" y="510" text-anchor="middle">read API</text>

  <path d="M 760 512 L 840 512" fill="none" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow-claude)" />
  <rect x="782" y="496" width="82" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="823" y="510" text-anchor="middle">enrich tags</text>

  <path d="M 1020 565 L 1020 585" fill="none" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow-claude)" />
  <rect x="1032" y="566" width="92" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="1078" y="580" text-anchor="middle">snapshot 7d</text>

  <!-- Control-plane arrows -->
  <path d="M 640 690 L 640 385" fill="none" stroke="#5a5a5a" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrow-claude-dashed)" />
  <rect x="652" y="522" width="62" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="683" y="536" text-anchor="middle">deploy</text>

  <path d="M 760 690 L 760 540 L 840 540" fill="none" stroke="#5a5a5a" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrow-claude-dashed)" />
  <rect x="786" y="524" width="102" height="20" rx="8" ry="8" fill="#f8f6f3" fill-opacity="0.95" stroke="none" />
  <text class="arrow-label" x="837" y="538" text-anchor="middle">restart + verify</text>

  <!-- Nodes -->
  <rect x="80" y="115" width="270" height="90" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)" />
  <text class="node-title" x="215" y="148" text-anchor="middle">Client Device</text>
  <text class="node-detail" x="215" y="171" text-anchor="middle">macOS / Windows / iPhone</text>
  <text class="node-detail" x="215" y="192" text-anchor="middle">vpn.sh / vpn.ps1 / vpn.cmd</text>

  <rect x="420" y="115" width="250" height="90" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)" />
  <text class="node-title" x="545" y="148" text-anchor="middle">Client Profiles</text>
  <text class="node-detail" x="545" y="171" text-anchor="middle">clients/*.ovpn</text>
  <text class="node-detail" x="545" y="192" text-anchor="middle">TCP default / UDP optional</text>

  <rect x="455" y="275" width="370" height="110" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)" />
  <text class="node-title" x="640" y="306" text-anchor="middle">OpenVPN EC2 Server</text>
  <text class="node-detail" x="640" y="329" text-anchor="middle">openvpn@server-tcp / openvpn@server-udp</text>
  <text class="node-detail" x="640" y="350" text-anchor="middle">TCP 443 → 10.9.0.0/24</text>
  <text class="node-detail" x="640" y="371" text-anchor="middle">UDP 443 → 10.8.0.0/24</text>

  <rect x="80" y="470" width="320" height="85" rx="12" ry="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)" />
  <text class="node-title" x="240" y="501" text-anchor="middle">Status Logs</text>
  <text class="node-detail" x="240" y="523" text-anchor="middle">/var/log/openvpn/status-tcp.log</text>
  <text class="node-detail" x="240" y="543" text-anchor="middle">/var/log/openvpn/status-udp.log</text>

  <rect x="440" y="470" width="320" height="85" rx="12" ry="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)" />
  <text class="node-title" x="600" y="501" text-anchor="middle">Device Hints</text>
  <text class="node-detail" x="600" y="523" text-anchor="middle">/var/log/openvpn/device_hints.json</text>
  <text class="node-detail" x="600" y="543" text-anchor="middle">client-connect hook</text>

  <rect x="840" y="455" width="360" height="110" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)" />
  <text class="node-title" x="1020" y="488" text-anchor="middle">Portal API/UI</text>
  <text class="node-detail" x="1020" y="511" text-anchor="middle">FastAPI + SSE live collector</text>
  <text class="node-detail" x="1020" y="533" text-anchor="middle">vpn-portal-tcp / vpn-portal-udp</text>

  <rect x="840" y="585" width="360" height="85" rx="12" ry="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)" />
  <text class="node-title" x="1020" y="616" text-anchor="middle">History DB</text>
  <text class="node-detail" x="1020" y="638" text-anchor="middle">data/history.sqlite3</text>
  <text class="node-detail" x="1020" y="658" text-anchor="middle">7-day snapshots</text>

  <rect x="80" y="706" width="1120" height="82" rx="12" ry="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)" />
  <text class="node-title" x="160" y="738" text-anchor="middle">Control Plane</text>
  <text class="node-detail" x="160" y="758" text-anchor="middle">Terraform · GitHub Actions OIDC</text>
  <text class="node-detail" x="160" y="778" text-anchor="middle">AWS SSM · S3 artifacts</text>

  <rect x="920" y="726" width="250" height="50" rx="10" ry="10" fill="#ffffff" fill-opacity="0.92" stroke="#d7d1c7" stroke-width="1.5" />
  <text class="legend-title" x="935" y="744">Legend</text>
  <line x1="935" y1="756" x2="965" y2="756" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow-claude)" />
  <text class="legend-text" x="975" y="760">runtime data flow</text>
  <line x1="935" y1="771" x2="965" y2="771" stroke="#5a5a5a" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrow-claude-dashed)" />
  <text class="legend-text" x="975" y="775">deploy / control flow</text>
</svg>
