name: OpenVPN CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "openvpn_portal/**"
      - "scripts/**"
      - "infrastructure/**"
      - "vpn.sh"
      - "vpn.ps1"
      - "vpn.cmd"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "openvpn_portal/**"
      - "scripts/**"
      - "infrastructure/**"
      - "vpn.sh"
      - "vpn.ps1"
      - "vpn.cmd"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Run deployment steps"
        type: boolean
        default: true
      instance_id:
        description: "Optional EC2 instance ID override (i-xxxxxxxxxxxxxxxxx)"
        type: string
        required: false
      artifact_s3_uri:
        description: "Optional S3 prefix override (s3://bucket/path)"
        type: string
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: openvpn-cicd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'ap-southeast-1' }}
  APP_DIR: /home/ec2-user/apps/vpn-portal-phase1-readonly
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install portal dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r openvpn_portal/requirements.txt

      - name: Python syntax check
        run: python3 -m compileall -q openvpn_portal

      - name: Shell syntax check
        shell: bash
        run: |
          bash -n vpn.sh
          bash -n scripts/openvpn_setup.sh
          bash -n scripts/reconcile_portal_service_ssm.sh
          bash -n scripts/rotate_portal_password_ssm.sh
          bash -n openvpn_portal/run_portal.sh

      - name: Terraform format check
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform validate
        run: |
          terraform -chdir=infrastructure init -backend=false
          terraform -chdir=infrastructure validate

  package:
    name: Package Portal
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    env:
      ROLE_TO_ASSUME: ${{ github.ref_name == 'main' && secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_TO_ASSUME_DEV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify OIDC role secret
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ROLE_TO_ASSUME}" ]]; then
            echo "ERROR: Missing OIDC role secret. Set AWS_ROLE_TO_ASSUME for main or AWS_ROLE_TO_ASSUME_DEV for non-main branches." >&2
            exit 1
          fi

      - name: Resolve artifact metadata
        id: meta
        shell: bash
        env:
          DEFAULT_ARTIFACT_S3_URI: ${{ secrets.ARTIFACT_S3_URI }}
          INPUT_ARTIFACT_S3_URI: ${{ github.event.inputs.artifact_s3_uri }}
        run: |
          set -euo pipefail
          S3_PREFIX="${INPUT_ARTIFACT_S3_URI:-$DEFAULT_ARTIFACT_S3_URI}"
          if [[ -z "$S3_PREFIX" ]]; then
            echo "ERROR: Missing artifact S3 prefix. Set secret ARTIFACT_S3_URI or workflow input artifact_s3_uri." >&2
            exit 1
          fi
          ARTIFACT_NAME="portal-${GITHUB_SHA}.tar.gz"
          ARTIFACT_URI="${S3_PREFIX%/}/${ARTIFACT_NAME}"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_s3_uri=$ARTIFACT_URI" >> "$GITHUB_OUTPUT"

      - name: Build deployment artifact
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "${{ steps.meta.outputs.artifact_name }}" -C openvpn_portal .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.artifact_name }}
          if-no-files-found: error

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact to S3
        run: |
          aws s3 cp "${{ steps.meta.outputs.artifact_name }}" "${{ steps.meta.outputs.artifact_s3_uri }}"

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: package
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    steps:
      - name: Resolve OIDC role for branch
        id: oidc_role
        shell: bash
        env:
          ROLE_MAIN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          ROLE_DEV: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          if [[ "$BRANCH" == "main" ]]; then
            ROLE="${ROLE_MAIN}"
            ROLE_LABEL="prod (main)"
          else
            ROLE="${ROLE_DEV}"
            ROLE_LABEL="dev ($BRANCH)"
          fi
          if [[ -z "$ROLE" ]]; then
            echo "ERROR: Missing OIDC role secret for $ROLE_LABEL. Set AWS_ROLE_TO_ASSUME (main) or AWS_ROLE_TO_ASSUME_DEV (dev/*)." >&2
            exit 1
          fi
          echo "role=$ROLE" >> "$GITHUB_OUTPUT"
          echo "Resolved OIDC role for $ROLE_LABEL"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.oidc_role.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deployment target
        id: target
        shell: bash
        env:
          INPUT_INSTANCE_ID: ${{ github.event.inputs.instance_id }}
        run: |
          set -euo pipefail
          INSTANCE_ID="${INPUT_INSTANCE_ID:-}"
          if [[ -z "$INSTANCE_ID" ]]; then
            INSTANCE_ID="$(aws ec2 describe-instances \
              --filters Name=tag:Name,Values=OpenVPN-Server Name=instance-state-name,Values=running \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text)"
          fi

          if [[ -z "$INSTANCE_ID" || "$INSTANCE_ID" == "None" ]]; then
            echo "ERROR: Could not resolve running OpenVPN-Server instance ID." >&2
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy artifact metadata
        id: deploy_meta
        shell: bash
        env:
          DEFAULT_ARTIFACT_S3_URI: ${{ secrets.ARTIFACT_S3_URI }}
          INPUT_ARTIFACT_S3_URI: ${{ github.event.inputs.artifact_s3_uri }}
        run: |
          set -euo pipefail
          S3_PREFIX="${INPUT_ARTIFACT_S3_URI:-$DEFAULT_ARTIFACT_S3_URI}"
          if [[ -z "$S3_PREFIX" ]]; then
            echo "ERROR: Missing artifact S3 prefix. Set secret ARTIFACT_S3_URI or workflow input artifact_s3_uri." >&2
            exit 1
          fi
          ARTIFACT_NAME="portal-${GITHUB_SHA}.tar.gz"
          ARTIFACT_URI="${S3_PREFIX%/}/${ARTIFACT_NAME}"
          echo "artifact_s3_uri=$ARTIFACT_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy artifact via SSM
        id: ssm
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
          ARTIFACT_S3_URI: ${{ steps.deploy_meta.outputs.artifact_s3_uri }}
          APP_DIR: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail

          if [[ -z "$ARTIFACT_S3_URI" ]]; then
            echo "ERROR: ARTIFACT_S3_URI resolved empty; refusing to run SSM deploy." >&2
            exit 1
          fi

          read -r -d '' REMOTE_SCRIPT <<'EOF' || true
          set -euo pipefail

          APP_DIR="${APP_DIR}"
          ARTIFACT_URI="${ARTIFACT_S3_URI}"
          UNIT_PATH="/etc/systemd/system/vpn-portal-phase1.service"
          TS="$(date +%Y%m%d%H%M%S)"
          ROLLBACK_ARCHIVE="/home/ec2-user/apps/releases/vpn-portal-phase1-${TS}.tar.gz"
          ENV_BACKUP="/tmp/vpn-portal-phase1-${TS}.env"

          mkdir -p /home/ec2-user/apps/releases
          mkdir -p "$APP_DIR"

          if [[ -f "$APP_DIR/.env" ]]; then
            cp "$APP_DIR/.env" "$ENV_BACKUP"
          fi

          if [[ "$(ls -A "$APP_DIR" 2>/dev/null || true)" != "" ]]; then
            tar -czf "$ROLLBACK_ARCHIVE" -C "$APP_DIR" .
          fi

          aws s3 cp "$ARTIFACT_URI" /tmp/vpn-portal-phase1.tar.gz
          find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
          tar -xzf /tmp/vpn-portal-phase1.tar.gz -C "$APP_DIR"
          chmod +x "$APP_DIR/run_portal.sh"

          install_python313() {
            if command -v python3.13 >/dev/null 2>&1; then
              python3.13 -c 'import ssl' >/dev/null 2>&1 && return 0
            fi

            PYTHON_ROOT="/opt/python-3.13"
            PYTHON_TARBALL="/tmp/cpython-3.13.13+20260510-x86_64-unknown-linux-gnu-install_only.tar.gz"
            PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260510/cpython-3.13.13+20260510-x86_64-unknown-linux-gnu-install_only.tar.gz"

            rm -rf "$PYTHON_ROOT"
            mkdir -p "$PYTHON_ROOT"
            curl -fsSL -o "$PYTHON_TARBALL" "$PYTHON_URL"
            tar -xzf "$PYTHON_TARBALL" -C "$PYTHON_ROOT"

            ln -sf "$PYTHON_ROOT/bin/python3.13" /usr/local/bin/python3.13
            ln -sf "$PYTHON_ROOT/bin/pip3.13" /usr/local/bin/pip3.13

            if ! command -v python3.13 >/dev/null 2>&1; then
              echo "ERROR: python3.13 install completed but binary is missing" >&2
              exit 1
            fi

            if ! python3.13 -c 'import ssl; import sys; print(sys.version)' >/dev/null 2>&1; then
              echo "ERROR: python3.13 is installed but ssl module is unavailable" >&2
              exit 1
            fi
          }

          install_python313

          # Service mode disables dependency installation at runtime.
          # Ensure the shared venv exists and has portal deps before restart.
          VENV_DIR="/home/ec2-user/apps/.python-venv"
          PY313_BIN="$(command -v python3.13)"
          if [[ -z "$PY313_BIN" || ! -x "$PY313_BIN" ]]; then
            echo "ERROR: python3.13 is not available after install_python313" >&2
            exit 1
          fi

          RECREATE_VENV=0
          if [[ -x "$VENV_DIR/bin/python" ]]; then
            CURRENT_VENV_MM="$(runuser -u ec2-user -- "$VENV_DIR/bin/python" -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")' 2>/dev/null || echo "0.0")"
            if [[ "$CURRENT_VENV_MM" != "3.13" ]]; then
              RECREATE_VENV=1
            fi
          else
            RECREATE_VENV=1
          fi

          if [[ "$RECREATE_VENV" == "1" ]]; then
            rm -rf "$VENV_DIR"
            runuser -u ec2-user -- "$PY313_BIN" -m venv "$VENV_DIR"
          fi

          VENV_PY="$VENV_DIR/bin/python3.13"
          if [[ ! -x "$VENV_PY" ]]; then
            echo "ERROR: expected Python 3.13 virtualenv at $VENV_PY" >&2
            exit 1
          fi

          runuser -u ec2-user -- "$VENV_PY" -m pip install --upgrade pip >/dev/null
          runuser -u ec2-user -- "$VENV_PY" -m pip install -r "$APP_DIR/requirements.txt" >/dev/null

          chown -R ec2-user:ec2-user "$VENV_DIR" || true

          if [[ -f "$ENV_BACKUP" && ! -f "$APP_DIR/.env" ]]; then
            cp "$ENV_BACKUP" "$APP_DIR/.env"
            chown ec2-user:ec2-user "$APP_DIR/.env" || true
            chmod 600 "$APP_DIR/.env" || true
          fi

          cat > "$UNIT_PATH" <<UNIT
          [Unit]
          Description=VPN Portal Phase1 ReadOnly
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=${APP_DIR}
          Environment=PORTAL_VENV_DIR=/home/ec2-user/apps/.python-venv
          EnvironmentFile=${APP_DIR}/.env
          Environment=RUN_PORTAL_MANAGE_DEPS=0
          ExecStart=${APP_DIR}/run_portal.sh
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          UNIT

          chown root:root "$UNIT_PATH"
          chmod 644 "$UNIT_PATH"

          systemctl daemon-reload
          systemctl enable vpn-portal-phase1 >/dev/null
          systemctl restart vpn-portal-phase1

          sleep 5

          SERVICE_OK=0
          for _ in $(seq 1 90); do
            if systemctl is-active --quiet vpn-portal-phase1; then
              SERVICE_OK=1
              break
            fi
            sleep 1
          done

          if [[ "$SERVICE_OK" != "1" ]]; then
            echo "ERROR: Portal service did not reach active state." >&2
            systemctl status --no-pager vpn-portal-phase1 || true
            journalctl -u vpn-portal-phase1 -n 100 --no-pager || true
            exit 1
          fi

          echo "== OPENVPN STATUS DIRECTIVES =="
          grep -nE '^status ' /etc/openvpn/server-tcp.conf
          grep -nE '^status ' /etc/openvpn/server-udp.conf

          TCP_STATUS_COUNT="$(grep -cE '^status ' /etc/openvpn/server-tcp.conf)"
          UDP_STATUS_COUNT="$(grep -cE '^status ' /etc/openvpn/server-udp.conf)"
          if [[ "$TCP_STATUS_COUNT" != "1" || "$UDP_STATUS_COUNT" != "1" ]]; then
            echo "ERROR: Expected exactly one status directive in each server config." >&2
            exit 1
          fi

          grep -q '^status /var/log/openvpn/status-tcp.log' /etc/openvpn/server-tcp.conf
          grep -q '^status /var/log/openvpn/status-udp.log' /etc/openvpn/server-udp.conf

          grep -q '^client-connect /etc/openvpn/scripts/client-connect-device-hints.sh' /etc/openvpn/server-tcp.conf
          grep -q '^client-connect /etc/openvpn/scripts/client-connect-device-hints.sh' /etc/openvpn/server-udp.conf

          systemctl is-active vpn-portal-phase1

          # The service can take a few seconds after restart before binding.
          HEALTH_OK=0
          for _ in $(seq 1 90); do
            if curl -fsS --max-time 5 http://127.0.0.1:8088/healthz >/dev/null; then
              HEALTH_OK=1
              break
            fi
            sleep 1
          done

          if [[ "$HEALTH_OK" != "1" ]]; then
            echo "ERROR: Portal health check failed after restart wait window." >&2
            systemctl status --no-pager vpn-portal-phase1 || true
            journalctl -u vpn-portal-phase1 -n 100 --no-pager || true
            ss -ltnp | grep ':8088' || true
            exit 1
          fi

          echo "ROLLBACK_ARCHIVE=${ROLLBACK_ARCHIVE}"
          EOF

          # Upload deploy script to S3 so SSM does not hit the 4000-char command limit.
          SCRIPT_S3_KEY="${ARTIFACT_S3_URI%/*}/deploy-script-${GITHUB_SHA}.sh"
          printf '%s' "$REMOTE_SCRIPT" > /tmp/deploy_script.sh
          aws s3 cp /tmp/deploy_script.sh "$SCRIPT_S3_KEY"

          PARAMETERS_JSON="$(cat <<JSON
          {"commands":["aws s3 cp '${SCRIPT_S3_KEY}' /tmp/deploy_openvpn_portal.sh && APP_DIR='${APP_DIR}' ARTIFACT_S3_URI='${ARTIFACT_S3_URI}' bash /tmp/deploy_openvpn_portal.sh"]}
          JSON
          )"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy portal artifact from GitHub Actions" \
            --parameters "$PARAMETERS_JSON" \
            --query 'Command.CommandId' \
            --output text)"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

          # Poll for up to 10 minutes (120 x 5s) instead of using aws ssm wait (max 2 min).
          FINAL_STATUS=""
          for attempt in $(seq 1 120); do
            STATUS_JSON="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '{Status:Status,StatusDetails:StatusDetails}' \
              --output json 2>/dev/null || echo '{"Status":"Unknown"}')"
            CURRENT_STATUS="$(echo "$STATUS_JSON" | python3 -c 'import sys,json; print(json.load(sys.stdin)["Status"])')"
            echo "[${attempt}/120] SSM status: $CURRENT_STATUS"
            case "$CURRENT_STATUS" in
              Success)
                FINAL_STATUS="Success"
                break
                ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated|ExecutionTimedOut)
                FINAL_STATUS="$CURRENT_STATUS"
                break
                ;;
            esac
            sleep 5
          done

          if [[ "$FINAL_STATUS" != "Success" ]]; then
            echo "ERROR: SSM command ended with status '$FINAL_STATUS', fetching invocation output:" >&2
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
              --output json || true
            exit 1
          fi

      - name: Fetch SSM output
        if: ${{ always() && steps.ssm.outputs.command_id != '' }}
        shell: bash
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json
